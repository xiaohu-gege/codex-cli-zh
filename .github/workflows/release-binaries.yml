name: release-binaries

on:
  push:
    tags:
      - "v*"
      - "rust-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (v1.0.0 / rust-v1.0.0 / 1.0.0)"
        required: true
      prerelease:
        description: "Mark this release as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve release tag and version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          raw_tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          raw_tag="${raw_tag#refs/tags/}"

          if [[ "${raw_tag}" =~ ^rust-v([0-9]+\.[0-9]+\.[0-9]+([-.].+)?)$ ]]; then
            version="${BASH_REMATCH[1]}"
            tag_name="${raw_tag}"
          elif [[ "${raw_tag}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+([-.].+)?)$ ]]; then
            version="${BASH_REMATCH[1]}"
            tag_name="${raw_tag}"
          elif [[ "${raw_tag}" =~ ^([0-9]+\.[0-9]+\.[0-9]+([-.].+)?)$ ]]; then
            version="${BASH_REMATCH[1]}"
            tag_name="v${version}"
          else
            echo "Invalid tag format: ${raw_tag}"
            echo "Expected: v1.0.0 / rust-v1.0.0 / 1.0.0 (supports prerelease suffixes)"
            exit 1
          fi

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  build:
    needs: metadata
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_suffix: windows-x86_64
            bin_name: codex.exe
          - os: macos-13
            target: x86_64-apple-darwin
            asset_suffix: macos-x86_64
            bin_name: codex
          - os: macos-14
            target: aarch64-apple-darwin
            asset_suffix: macos-aarch64
            bin_name: codex
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_suffix: linux-x86_64
            bin_name: codex
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_suffix: linux-aarch64
            bin_name: codex
            optional: true
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y pkg-config libcap-dev

      - name: Build codex (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release --locked --target "${{ matrix.target }}" --manifest-path codex-rs/Cargo.toml -p codex-cli --bin codex

      - name: Build codex (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.target }}" --manifest-path codex-rs/Cargo.toml -p codex-cli --bin codex

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "codex-rs/target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/${{ matrix.bin_name }}"
          @"
          Codex CLI (Windows)

          1) Unzip this package.
          2) Open PowerShell in this folder.
          3) Run: .\codex.exe

          Optional:
          - Move codex.exe to a custom folder and add it to PATH.
          "@ | Set-Content -Path dist/README.txt -Encoding UTF8
          Compress-Archive -Path dist/* -DestinationPath "codex-${{ needs.metadata.outputs.tag_name }}-${{ matrix.asset_suffix }}.zip" -Force

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "codex-rs/target/${{ matrix.target }}/release/${{ matrix.bin_name }}" "dist/${{ matrix.bin_name }}"
          chmod +x "dist/${{ matrix.bin_name }}"
          cat > dist/README.txt <<'EOF'
          Codex CLI

          1) Extract the archive.
          2) Open a terminal in this folder.
          3) Run: ./codex

          Optional:
          - Move codex to a folder in PATH, for example /usr/local/bin.
          EOF
          tar -C dist -czf "codex-${{ needs.metadata.outputs.tag_name }}-${{ matrix.asset_suffix }}.tar.gz" .

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: codex-${{ matrix.asset_suffix }}
          if-no-files-found: error
          path: codex-${{ needs.metadata.outputs.tag_name }}-${{ matrix.asset_suffix }}.zip

      - name: Upload Unix artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: codex-${{ matrix.asset_suffix }}
          if-no-files-found: error
          path: codex-${{ needs.metadata.outputs.tag_name }}-${{ matrix.asset_suffix }}.tar.gz

  create-release:
    needs: [metadata, build]
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          ls -lh release
          count="$(find release -type f | wc -l | tr -d ' ')"
          if [ "${count}" = "0" ]; then
            echo "No release files were produced."
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.tag_name }}
          name: ${{ needs.metadata.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.metadata.outputs.version, '-') || (github.event_name == 'workflow_dispatch' && inputs.prerelease) }}
          files: |
            release/*.zip
            release/*.tar.gz
